name: 💡 Feature request
description: Suggest a new capability or improvement
title: "[Feature] "
labels: [enhancement, roadmap-vote]
body:
  - type: markdown
    attributes:
      value: |
        We ship what customers vote for. Tell us what you need and how it would help.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the underlying need, not just the feature.
      placeholder: Our finance team needs to attach the same QBR PDF to every Account record on the first business day of each quarter.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: A scheduled-Apex job that takes a template ID + dynamic record filter and creates a ContentVersion linked to each matching record.
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: How critical is this for your team?
      options:
        - Nice to have
        - Would meaningfully improve our workflow
        - Blocking — we cannot adopt Crafter PDF without it
    validations:
      required: true
  - type: dropdown
    id: tier
    attributes:
      label: Which tier are you on (or considering)?
      options:
        - Free
        - Team
        - Org Flat
        - Founding customer
        - Just evaluating
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: What are you doing today instead?
      placeholder: Manually exporting reports and combining them in Adobe Acrobat each quarter.
