<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#1a2236"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff7a3d"/>
      <stop offset="100%" stop-color="#ffb066"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#ff7a3d" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff7a3d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Brand mark + name -->
  <g transform="translate(80, 90)">
    <rect width="64" height="64" rx="14" fill="url(#accent)"/>
    <text x="32" y="32" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="38" fill="#1a0f00" text-anchor="middle" dominant-baseline="central">C</text>
    <text x="84" y="40" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="30" fill="#f5f7fb">Crafter PDF</text>
  </g>

  <!-- Headline -->
  <g transform="translate(80, 240)">
    <text font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="74" fill="#f5f7fb" letter-spacing="-2">
      <tspan x="0" y="0">Branded PDFs</tspan>
      <tspan x="0" y="86">from any Salesforce</tspan>
    </text>
    <text font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="74" fill="url(#accent)" letter-spacing="-2">
      <tspan x="0" y="172">dashboard. In one click.</tspan>
    </text>
  </g>

  <!-- Footer tagline -->
  <text x="80" y="580" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="22" fill="#9aa6c0">
    Native LWC · Client-side · Zero data egress · By FairCloudCrafter
  </text>
</svg>
